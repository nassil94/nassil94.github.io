<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calcolatore del Fattore di Rischio sul lavoro</title>
    </head>
    <body>
        <form id = "rischio">            <!-- CREAZIONE DI UN FORM PER CALCOLARE IL FATTORE DI RISCHIO CON I DATI INSERITI DALL´UTENTE -->
            Gravitá del danno:<br>                  <!-- LISTA DI VOCI PER IL MENU DI SCELTA-->
            <label><input type=radio name=gravita value=1>1 - Lieve</label><br>
            <label><input type=radio name=gravita value=2>2 - Medio</label><br>
            <label><input type=radio name=gravita value=3>3 - Grave</label><br>
            <label><input type=radio name=gravita value=4>4 - Gravissimo</label><br>
            <br><br>
            Probabilitá:<br>
            <label><input type=radio name=probabilita value=1>1 - Improbabile</label><br>
            <label><input type=radio name=probabilita value=2>2 - Poco probabile</label><br>
            <label><input type=radio name=probabilita value=3>3 - Probabile</label><br>
            <label><input type=radio name=probabilita value=4>4 - Altamente probabile</label><br><br><br>
            <input type=submit value="Calcola">
        </form>
        <div id="messaggio"></div>
        <div id="immagineRischio"></div>

            <script>
                document.getElementById("rischio").addEventListener("submit", function(e){
                    e.preventDefault(); // EVITA DI RICARICARE LA PAGINA 

                    const gravita = parseInt(document.querySelector('input[name="gravita"]:checked')?.value ?? 0, 10); // CONVERSIONE DEI DATI INSERITI NEL FORM IN INTERO
                    const probabilita = parseInt(document.querySelector('input[name="probabilita"]:checked')?.value ?? 0, 10);
                    if (!gravita || !probabilita) {
                           document.getElementById("messaggio").innerText = "Selezionare entrambi i valori!"; // PER FAR SI CHE L´UTENTE SCELGA SIA LA PROBABILITA CHE IL RISCHIO
                           document.getElementById("immagineRischio").innerHTML = "";  //PER FAR SI CHE NON COMPAIA LA MATRICE
                           return;
                    }
                    const rischio = gravita * probabilita;  //CALCOLO DEL FATTORE DI RISCHIO
                    let immagine = "matrice_del_rischio.jpg";
                    document.getElementById("messaggio").innerText = "Il fattore di rischio è: " + rischio;
                    document.getElementById("immagineRischio").innerHTML = `<img src="${immagine}" alt="Rischio" style="max-width:500px;">`;
                });
            </script>
    </body>
</html>
