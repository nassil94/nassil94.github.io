<html>
    <head>
        <meta charset="UTF-8">    <!--PER LA VISUALIZZAZIONE CORRETTA DI CERTI CARATTERI SULLA PAGIMA WEB-->
        <meta name="viewport" content="width=device-width, initial-scale=2.0">   <!--PER RENDERE LA PAGINA MOBILE-FRIENDLY-->
        <title>Calcolatore del Fattore di Rischio sul lavoro</title>        <!-- TITOLO DELLA PAGINA WEB -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="d-flex flex-column flex-md-row p-4 gap-4 py-md-5 align-items-center justify-content-left">
              <div class="list-group list-group-checkable d-grid gap-2 border-0">
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios1" value="1" checked="">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios1"><font _mstmutation="1" _msttexthash="155402" _msthash="37">1 - Lieve</font><span class="d-block small opacity-50" _msttexthash="2217007" _msthash="38"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios2" value="2">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios2"><font _mstmutation="1" _msttexthash="201435" _msthash="39">2 - Medio</font><span class="d-block small opacity-50" _msttexthash="364559" _msthash="40"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios3" value="3">
                     <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios3"><font _mstmutation="1" _msttexthash="157157" _msthash="41">3 - Grave</font><span class="d-block small opacity-50" _msttexthash="1362634" _msthash="42"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios4" value="4">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios4"><font _mstmutation="1" _msttexthash="540995" _msthash="43">4 - Gravissimo</font><span class="d-block small opacity-50" _msttexthash="732446" _msthash="44"></span>
                        </label>
               </div>
                 <div class="list-group list-group-checkable d-grid gap-2 border-0">
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios1" value="1" checked="">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios1"><font _mstmutation="1" _msttexthash="155402" _msthash="37">1 - Improbabile</font><span class="d-block small opacity-50" _msttexthash="2217007" _msthash="38"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios2" value="2">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios2"><font _mstmutation="1" _msttexthash="201435" _msthash="39">2 - Poco probabile</font><span class="d-block small opacity-50" _msttexthash="364559" _msthash="40"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios3" value="3">
                     <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios3"><font _mstmutation="1" _msttexthash="157157" _msthash="41">3 - Probabile</font><span class="d-block small opacity-50" _msttexthash="1362634" _msthash="42"></span>
                        </label>
                    <input class="list-group-item-check pe-none" type="radio" name="listGroupCheckableRadios" id="listGroupCheckableRadios4" value="4">
                    <label class="list-group-item rounded-3 py-3" for="listGroupCheckableRadios4"><font _mstmutation="1" _msttexthash="540995" _msthash="43">4 - Altamente probabile</font><span class="d-block small opacity-50" _msttexthash="732446" _msthash="44"></span>
                        </label>
                    <input type=submit value="Calcola">
               </div>
        </div>
     
        <div id="messaggio"></div>        <!-- CONTENITORE PER LA VISUALIZZAZIONE DI UN MESSAGGIO AL VERIFICARSI DI UN EVENTO -->
        <div id="immagineRischio"></div>    <!-- CONTENITORE PER LA VISUALIZZAZIONE DELLA MATRICE DEL RISCHIO ALLA VISUALIZZAZIONE IN OUTPUT DEL FATTORE DI RISCHIO -->

            <script>        // CODICE IN jAVASCRIPT
                document.getElementById("rischio").addEventListener("submit", function(e){  //AGGIUNTA DI UN EVENTO PER IL CALCOLO DEL FATTORE DEL RISCHIO
                    e.preventDefault(); // EVITA DI RICARICARE LA PAGINA 

                    const gravita = parseInt(document.querySelector('input[name="gravita"]:checked')?.value ?? 0, 10); // CONVERSIONE IN INT DEI DATI INSERITI NEL FORM 
                    const probabilita = parseInt(document.querySelector('input[name="probabilita"]:checked')?.value ?? 0, 10);
                    if (!gravita || !probabilita) {        //VERIFICA IN CASO L´UTENTE NON SELEZIONA UNO DEI DUE VALORI DI GRAVITÁ O DI PROBABILITÁ
                           document.getElementById("messaggio").innerText = "Selezionare entrambi i valori!";  //VISUALIZZA IN OUTPUT IL MESSAGGIO DI ERRORE
                           document.getElementById("immagineRischio").innerHTML = "";  //PER FAR SI CHE NON COMPAIA LA MATRICE DURANTE IL MESSAGGIO DI ERRORE
                           return;
                    }
                    const rischio = gravita * probabilita;  //CALCOLO DEL FATTORE DI RISCHIO
                    let immagine = "matrice_del_rischio.jpg";  //IMMAGINE DELLA MATRICE DI RISCHIO
                    document.getElementById("messaggio").innerText = "Il fattore di rischio è: " + rischio;    //VISUALIZZAZIONE IN OUTPUT DEL VALORE DEL FATTORE DEL RISCHIO RICAVATO
                    document.getElementById("immagineRischio").innerHTML = `<img src="${immagine}" alt="Rischio" style="max-width:500px;">`;  //VISUALIZZAZIONE IN OUTPUT DELLA MATRICE DEL RISCHIO
                });
            </script>
    </body>
</html>
