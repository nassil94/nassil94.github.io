<html>
    <head>
        <meta charset="UTF-8">    <!--PER LA VISUALIZZAZIONE CORRETTA DI CERTI CARATTERI SULLA PAGIMA WEB-->
        <meta name="viewport" content="width=device-width, initial-scale=2.0">   <!--PER RENDERE LA PAGINA MOBILE-FRIENDLY-->
        <title>Calcolatore del Fattore di Rischio sul lavoro</title>        <!-- TITOLO DELLA PAGINA WEB -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
          <div id="rischio">
                  <p class="h1">Gravitá del danno:</p>
                  <ul class="list-group">
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="1" id="lieve">
                                <label class="form-check-label" for="firstRadio"> 1 - Lieve </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="2" id="medio">
                                <label class="form-check-label" for="secondRadio"> 2 - Medio </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="3" id="grave">
                                <label class="form-check-label" for="thirdRadio"> 3 - Grave </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="4" id="gravissimo">
                                <label class="form-check-label" for="fourthRadio"> 4 - Gravissimo </label>
                          </li>
                 </ul>
                <p class="h1">Probabilitá:</p>
                  <ul class="list-group">
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="1" id="improbabile">
                                <label class="form-check-label" for="firstRadio"> 1 - Improbabile </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="2" id="pocoProbabile">
                                <label class="form-check-label" for="secondRadio"> 2 - Poco Probabile </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="3" id="probbaile">
                                <label class="form-check-label" for="thirdRadio"> 3 - Probabile </label>
                          </li>
                          <li class="list-group-item">
                                <input class="form-check-input me-1" type="radio" name="listGroupRadio" value="4" id="altamenteProbabile">
                                <label class="form-check-label" for="fourthRadio"> 4 - Altamente Probabile </label>
                          </li>
                 </ul>
                <input class="btn btn-primary" type="button" value="Calcola">
            
          </div>
     
        <div id="messaggio"></div>        <!-- CONTENITORE PER LA VISUALIZZAZIONE DI UN MESSAGGIO AL VERIFICARSI DI UN EVENTO -->
        <div id="immagineRischio"></div>    <!-- CONTENITORE PER LA VISUALIZZAZIONE DELLA MATRICE DEL RISCHIO ALLA VISUALIZZAZIONE IN OUTPUT DEL FATTORE DI RISCHIO -->

            <script>        // CODICE IN jAVASCRIPT
                document.getElementById("rischio").addEventListener("submit", function(e){  //AGGIUNTA DI UN EVENTO PER IL CALCOLO DEL FATTORE DEL RISCHIO
                    e.preventDefault(); // EVITA DI RICARICARE LA PAGINA 

                    const gravita = parseInt(document.querySelector('input[name="gravita"]:checked')?.value ?? 0, 10); // CONVERSIONE IN INT DEI DATI INSERITI NEL FORM 
                    const probabilita = parseInt(document.querySelector('input[name="probabilita"]:checked')?.value ?? 0, 10);
                    if (!gravita || !probabilita) {        //VERIFICA IN CASO L´UTENTE NON SELEZIONA UNO DEI DUE VALORI DI GRAVITÁ O DI PROBABILITÁ
                           document.getElementById("messaggio").innerText = "Selezionare entrambi i valori!";  //VISUALIZZA IN OUTPUT IL MESSAGGIO DI ERRORE
                           document.getElementById("immagineRischio").innerHTML = "";  //PER FAR SI CHE NON COMPAIA LA MATRICE DURANTE IL MESSAGGIO DI ERRORE
                           return;
                    }
                    const rischio = gravita * probabilita;  //CALCOLO DEL FATTORE DI RISCHIO
                    let immagine = "matrice_del_rischio.jpg";  //IMMAGINE DELLA MATRICE DI RISCHIO
                    document.getElementById("messaggio").innerText = "Il fattore di rischio è: " + rischio;    //VISUALIZZAZIONE IN OUTPUT DEL VALORE DEL FATTORE DEL RISCHIO RICAVATO
                    document.getElementById("immagineRischio").innerHTML = `<img src="${immagine}" alt="Rischio" style="max-width:500px;">`;  //VISUALIZZAZIONE IN OUTPUT DELLA MATRICE DEL RISCHIO
                });
            </script>
    </body>
</html>
