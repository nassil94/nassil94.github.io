<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore del Rischio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4" style="background-color: lightblue;">

<div class="container">

  <div class="row g-4">

    <!-- FORM -->
    <div class="col-md-6">

      <form id="rischio" class="p-3 bg-white rounded shadow">

        <h4>Gravità del danno</h4>
        <div class="list-group mb-4">
          <label class="list-group-item">
            <input type="radio" name="gravita" value="1" class="form-check-input me-2"> 1 - Lieve
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="2" class="form-check-input me-2"> 2 - Medio
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="3" class="form-check-input me-2"> 3 - Grave
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="4" class="form-check-input me-2"> 4 - Gravissimo
          </label>
        </div>

        <h4>Probabilità</h4>
        <div class="list-group mb-4">
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="1" class="form-check-input me-2"> 1 - Improbabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="2" class="form-check-input me-2"> 2 - Poco probabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="3" class="form-check-input me-2"> 3 - Probabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="4" class="form-check-input me-2"> 4 - Altamente probabile
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Calcola</button>

        <div id="messaggio" class="mt-3 fw-bold"></div>

      </form>

    </div>

    <!-- IMMAGINE -->
    <div class="col-md-6 text-center">

      <img src="matrice_del_rischio.jpg"
           class="img-fluid rounded shadow"
           alt="Matrice del rischio">

    </div>

  </div>

</div>

<script>
document.getElementById("rischio").addEventListener("submit", function(e) {
  e.preventDefault();

  const gravita = parseInt(document.querySelector('input[name="gravita"]:checked')?.value);
  const probabilita = parseInt(document.querySelector('input[name="probabilita"]:checked')?.value);

  const output = document.getElementById("messaggio");

  if (!gravita || !probabilita) {
    output.innerText = "Seleziona entrambi i valori!";
    output.className = "text-danger fw-bold";
    return;
  }

  const rischio = gravita * probabilita;

  let classe = "text-success";
  if (rischio >= 6 && rischio < 12) classe = "text-warning";
  if (rischio >= 12) classe = "text-danger";

  output.innerText = "Fattore di rischio: " + rischio;
  output.className = classe + " fw-bold";
});
</script>

</body>
</html>
