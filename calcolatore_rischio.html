<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore del Rischio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4" style="background-color: lightblue;">
<div class="container">
<div class="row">  
<div class="col-sm-3"> 
<form id="rischio" class="container">

    <h2>Gravità del danno</h2>
    <div class="list-group mb-4">
        <label class="list-group-item">
            <input type="radio" name="gravita" value="1" class="form-check-input me-2"> 1 - Lieve
        </label>
        <label class="list-group-item">
            <input type="radio" name="gravita" value="2" class="form-check-input me-2"> 2 - Medio
        </label>
        <label class="list-group-item">
            <input type="radio" name="gravita" value="3" class="form-check-input me-2"> 3 - Grave
        </label>
        <label class="list-group-item">
            <input type="radio" name="gravita" value="4" class="form-check-input me-2"> 4 - Gravissimo
        </label>
    </div>

    <h2>Probabilità</h2>
    <div class="list-group mb-4">
        <label class="list-group-item">
            <input type="radio" name="probabilita" value="1" class="form-check-input me-2"> 1 - Improbabile
        </label>
        <label class="list-group-item">
            <input type="radio" name="probabilita" value="2" class="form-check-input me-2"> 2 - Poco probabile
        </label>
        <label class="list-group-item">
            <input type="radio" name="probabilita" value="3" class="form-check-input me-2"> 3 - Probabile
        </label>
        <label class="list-group-item">
            <input type="radio" name="probabilita" value="4" class="form-check-input me-2"> 4 - Altamente probabile
        </label>
    </div>

    <button type="submit" class="btn btn-primary">Calcola</button>

</form>
</div>

<div class="col-sm-3">
    <img src="matrice_del_rischio.jpg" class="rounded">
</div></div>
    
<!-- OUTPUT -->
<div id="messaggio" class="mt-4 fw-bold"></div>

<script>
document.getElementById("rischio").addEventListener("submit", function(e) {
    e.preventDefault();

    const gravita = parseInt(document.querySelector('input[name="gravita"]:checked')?.value);
    const probabilita = parseInt(document.querySelector('input[name="probabilita"]:checked')?.value);

    if (!gravita || !probabilita) {
        document.getElementById("messaggio").innerText = "Seleziona entrambi i valori!";
        document.getElementById("messaggio").className = "text-danger fw-bold";
        return;
    }

    const rischio = gravita * probabilita;

    // Colore dinamico
    let colore = "text-success";
    if (rischio >= 4) colore = "text-warning";
    if (rischio >= 9) colore = "text-danger";

    document.getElementById("messaggio").innerText = "Fattore di rischio: " + rischio;
    document.getElementById("messaggio").className = colore + " fw-bold";

    document.getElementById("immagineRischio").innerHTML =
        `<img src="matrice_del_rischio.jpg" class="img-fluid mt-3" style="max-width:500px;">`;
});
</script>

</body>
</html>
