<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore del Rischio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4" style="background-color: lightblue;">
<div class="container p-3 my-3 bg-primary text-white" style="text-align: center;">
     <p class="h2">Calcolatore del fattore di rischio</p>
</div>
<div class="container">

  <div class="row g-4">

    <!-- FORM -->
    <div class="col-md-6">

      <form id="rischio" class="p-3 bg-white rounded shadow">

        <h4>Gravità del danno</h4>
        <div class="list-group mb-4">
          <label class="list-group-item">
            <input type="radio" name="gravita" value="1" class="form-check-input me-2"> 1 - Lieve
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="2" class="form-check-input me-2"> 2 - Medio
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="3" class="form-check-input me-2"> 3 - Grave
          </label>
          <label class="list-group-item">
            <input type="radio" name="gravita" value="4" class="form-check-input me-2"> 4 - Gravissimo
          </label>
        </div>

        <h4>Probabilità</h4>
        <div class="list-group mb-4">
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="1" class="form-check-input me-2"> 1 - Improbabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="2" class="form-check-input me-2"> 2 - Poco probabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="3" class="form-check-input me-2"> 3 - Probabile
          </label>
          <label class="list-group-item">
            <input type="radio" name="probabilita" value="4" class="form-check-input me-2"> 4 - Altamente probabile
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Calcola</button>
      </form>

      <!-- MODALE ERRORE -->
      <div class="modal fade" id="erroreModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">

            <div class="modal-header">
              <h5 class="modal-title">Errore</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              Devi selezionare entrambi i valori!
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                OK
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- IMMAGINE -->
    <div class="col-md-6 text-center">

     
      <img src="matrice_del_rischio.jpg"
           class="img-fluid rounded shadow mb-3"
           style="max-height: 400px; width: auto;">
    <br><h3>FATTORE DI RISCHIO<small> = Probabilità × Gravità</small></h3>
    <div id="messaggio" class="mt-1 fw-bold fs-1"></div>

    </div>
  </div>

  <button onclick="window.location.href='index.html'" 
        class="btn btn-primary btn-lg d-block mx-auto">
  Homepage
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("rischio").addEventListener("submit", function(e) {
  e.preventDefault();

  const gravita = document.querySelector('input[name="gravita"]:checked');
  const probabilita = document.querySelector('input[name="probabilita"]:checked');

  const output = document.getElementById("messaggio");

  const modal = new bootstrap.Modal(document.getElementById('erroreModal'));

  if (!gravita || !probabilita) {
    modal.show();
    return;
  }

  const rischio = parseInt(gravita.value) * parseInt(probabilita.value);

  let classe = "text-success";
  if (rischio >= 4 && rischio <=8) classe = "text-warning";
  if (rischio >= 9) classe = "text-danger";

  output.innerText = "Fattore di rischio: " + rischio;

  output.className = classe + " fw-bold fs-1 mt-3";
});
</script>

</body>
</html>
